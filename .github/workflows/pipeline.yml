name: Build Lance Extension

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_server:
    runs-on: 
      windows-2022  # For a list of available runner types, refer to https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
      
    - name: Execute build
      run: dotnet build -c Release

    - name: Execute unit tests
      run: dotnet test -c Release

    - name: Publish self-contained server
      run: dotnet publish LanceServer\LanceServer.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -o lance-extension\server\win-x64

    - name: Remove standalone configuration files
      shell: pwsh
      run: |
        Remove-Item lance-extension\server\win-x64\config.json -ErrorAction SilentlyContinue
        Remove-Item lance-extension\server\win-x64\preprocessor_config.json -ErrorAction SilentlyContinue
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: server
        path: .\lance-extension\server\win-x64\
      
  build_extension:
    needs: build_server
    runs-on: 
      windows-2022  # For a list of available runner types, refer to https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js environment
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        
    - name: install vsce
      run: npm -g install @vscode/vsce
        
    - name: Download server artifact
      uses: actions/download-artifact@v4
      with:
        name: server
        path: lance-extension/server/win-x64

    - name: install dependencies
      working-directory: .\lance-extension
      run: npm ci

    - name: Execute build
      working-directory: .\lance-extension
      run: npm run compile
      
    - name: package
      working-directory: .\lance-extension
      run: vsce package --baseImagesUrl https://raw.githubusercontent.com/Krualten/lance/main/lance-extension/
      
    - name: Upload Extension
      uses: actions/upload-artifact@v4
      with:
        name: extension
        path: .\lance-extension\*.vsix
